<!DOCTYPE html>
<html lang="en"
      vocab="https://schema.org/"
      prefix="rdfs: http://www.w3.org/2000/01/rdf-schema# xsd: http://www.w3.org/2001/XMLSchema#">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile POC</title>
  <link rel="stylesheet" href="/css/base.css">
  <script type="importmap">
  {
    "imports": {
      "@chapeaux/cpx-store": "/vendor/cpx-store.js",
      "@chapeaux/cpx-store/plugins/collab": "/vendor/plugins/collab.js",
      "@chapeaux/cpx-store/transports/sse": "/vendor/transports/sse.js"
    }
  }
  </script>
</head>
<body>
  <header>
    <nav vocab="#" aria-label="Primary navigation">
      <a href="/profile" typeof="navProfile"></a>
      <a href="/edit" typeof="navEdit"></a>
    </nav>
    <div class="lang-switcher">
      <button type="button" data-lang="en" class="lang-btn active">EN</button>
      <button type="button" data-lang="fr" class="lang-btn">FR</button>
      <button type="button" data-lang="es" class="lang-btn">ES</button>
    </div>
  </header>
  <main></main>
  <script type="application/json" id="initial-state"></script>
  <profile-store></profile-store>
  <script type="module" src="/src/components/profile-store.js"></script>
  <script type="module">
    import { setLocale, connectLabelStream } from '/src/utils/i18n.js';
    connectLabelStream('/api/events');
    for (const btn of document.querySelectorAll('.lang-btn')) {
      btn.addEventListener('click', () => {
        document.querySelector('.lang-btn.active')?.classList.remove('active');
        btn.classList.add('active');
        setLocale(btn.dataset.lang);
      });
    }
  </script>
</body>
</html>
