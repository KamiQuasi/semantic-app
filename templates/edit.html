<script type="module" src="/src/components/profile-editor.js"></script>

<profile-editor>
  <template shadowrootmode="open">
    <link rel="stylesheet" href="/css/profile-editor.css">

    <form class="editor" vocab="https://schema.org/" resource="#me" typeof="Person">
      <h1 vocab="#" typeof="editHeading"></h1>

      <label><span typeof="name"></span>
        <input type="text" data-prop="name" property="name"></label>

      <label><span typeof="jobTitle"></span>
        <input type="text" data-prop="jobTitle" property="jobTitle"></label>

      <label><span typeof="email"></span>
        <input type="email" data-prop="email" property="email"></label>

      <label><span typeof="description"></span>
        <textarea data-prop="description" property="description" rows="3"></textarea></label>

      <label>
        <input type="checkbox" data-prop="isActive" property="isActive">
        <span typeof="isActive"></span></label>

      <label><span typeof="url"></span>
        <input type="url" data-prop="url" property="url"></label>

      <label><span typeof="image"></span>
        <input type="url" data-prop="image" property="image"></label>

      <fieldset property="address" resource="#address" typeof="PostalAddress">
        <legend typeof="address"></legend>
        <label><span typeof="streetAddress"></span>
          <input type="text" data-prop="address.streetAddress" property="streetAddress"></label>
        <label><span typeof="addressLocality"></span>
          <input type="text" data-prop="address.addressLocality" property="addressLocality"></label>
        <label><span typeof="addressCountry"></span>
          <input type="text" data-prop="address.addressCountry" property="addressCountry"></label>
      </fieldset>

      <fieldset property="knowsLanguage">
        <legend typeof="knowsLanguage"></legend>
        <template>
          <label class="checkbox-item"><input type="checkbox" checked> <span data-text></span></label>
        </template>
        <input type="text" vocab="#" typeof="placeholderLang" class="add-language-input">
        <button type="button" vocab="#" typeof="actionAdd" class="add-language-btn"></button>
      </fieldset>

      <fieldset>
        <legend vocab="#" typeof="skillsHint"></legend>
        <ol property="hasSkill" class="sortable-list">
          <template>
            <li draggable="true">
              <span class="drag-handle" aria-hidden="true">&#8801;</span>
              <span class="skill-text" data-text></span>
              <button type="button" class="remove-btn">&#215;</button>
            </li>
          </template>
        </ol>
        <input type="text" vocab="#" typeof="placeholderSkill" class="add-skill-input">
        <button type="button" vocab="#" typeof="actionAdd" class="add-skill-btn"></button>
      </fieldset>
    </form>
  </template>
</profile-editor>
