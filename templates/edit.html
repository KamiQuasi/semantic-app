<script type="module" src="/src/components/profile-editor.js"></script>

<profile-editor>
  <template shadowrootmode="open">
    <link rel="stylesheet" href="/css/profile-editor.css">

    <form class="editor" vocab="https://schema.org/" resource="#me" typeof="Person">
      <h1 vocab="urn:ui:" typeof="editHeading"></h1>

      <label><span typeof="name"></span>
        <input type="text" data-prop="name" property="name"></label>

      <div class="i18n-field">
        <span typeof="jobTitle"></span>
        <div class="lang-tabs" role="tablist">
          <button type="button" class="lang-tab active" data-lang="en" vocab="urn:ui:" typeof="langEn"></button>
          <button type="button" class="lang-tab" data-lang="fr" vocab="urn:ui:" typeof="langFr"></button>
          <button type="button" class="lang-tab" data-lang="es" vocab="urn:ui:" typeof="langEs"></button>
        </div>
        <input type="text" data-prop="jobTitle.en" property="jobTitle" data-lang="en">
        <input type="text" data-prop="jobTitle.fr" property="jobTitle" data-lang="fr" hidden>
        <input type="text" data-prop="jobTitle.es" property="jobTitle" data-lang="es" hidden>
      </div>

      <label><span typeof="email"></span>
        <input type="email" data-prop="email" property="email"></label>

      <div class="i18n-field">
        <span typeof="description"></span>
        <div class="lang-tabs" role="tablist">
          <button type="button" class="lang-tab active" data-lang="en" vocab="urn:ui:" typeof="langEn"></button>
          <button type="button" class="lang-tab" data-lang="fr" vocab="urn:ui:" typeof="langFr"></button>
          <button type="button" class="lang-tab" data-lang="es" vocab="urn:ui:" typeof="langEs"></button>
        </div>
        <textarea data-prop="description.en" property="description" data-lang="en" rows="3"></textarea>
        <textarea data-prop="description.fr" property="description" data-lang="fr" rows="3" hidden></textarea>
        <textarea data-prop="description.es" property="description" data-lang="es" rows="3" hidden></textarea>
      </div>

      <label>
        <input type="checkbox" data-prop="isActive" property="isActive">
        <span typeof="isActive"></span></label>

      <label><span typeof="url"></span>
        <input type="url" data-prop="url" property="url"></label>

      <label><span typeof="image"></span>
        <input type="url" data-prop="image" property="image"></label>

      <label><span typeof="worksFor"></span>
        <input type="text" data-prop="worksForId" list="orgs-datalist" autocomplete="off"></label>
      <datalist id="orgs-datalist"></datalist>

      <fieldset property="address" resource="#address" typeof="PostalAddress">
        <legend typeof="address"></legend>
        <label><span typeof="streetAddress"></span>
          <input type="text" data-prop="address.streetAddress" property="streetAddress"></label>
        <label><span typeof="addressLocality"></span>
          <input type="text" data-prop="address.addressLocality" property="addressLocality"></label>
        <label><span typeof="addressCountry"></span>
          <input type="text" data-prop="address.addressCountry" property="addressCountry"></label>
      </fieldset>

      <fieldset property="knowsLanguage">
        <legend typeof="knowsLanguage"></legend>
        <template>
          <label class="checkbox-item"><input type="checkbox" checked> <span data-text></span></label>
        </template>
        <input type="text" vocab="urn:ui:" typeof="placeholderLang" class="add-language-input">
        <button type="button" vocab="urn:ui:" typeof="actionAdd" class="add-language-btn"></button>
      </fieldset>

      <fieldset>
        <legend vocab="urn:ui:" typeof="skillsHint"></legend>
        <ol property="hasSkill" class="sortable-list">
          <template>
            <li draggable="true">
              <span class="drag-handle" aria-hidden="true">&#8801;</span>
              <span class="skill-text" data-text></span>
              <button type="button" class="remove-btn">&#215;</button>
            </li>
          </template>
        </ol>
        <input type="text" vocab="urn:ui:" typeof="placeholderSkill" class="add-skill-input">
        <button type="button" vocab="urn:ui:" typeof="actionAdd" class="add-skill-btn"></button>
      </fieldset>
    </form>
  </template>
</profile-editor>
