<script type="module" src="/src/components/profile-card.js"></script>

<profile-card>
  <template shadowrootmode="open">
    <link rel="stylesheet" href="/css/profile-card.css">

    <article class="card" vocab="https://schema.org/" resource="#me" typeof="Person">
      <header>
        <img property="image" alt="Avatar" class="avatar">
        <h1 property="name" data-transform="capitalize"></h1>
        <p property="jobTitle" xml:lang="en"></p>
        <p property="jobTitle" xml:lang="fr" hidden></p>
        <p property="jobTitle" xml:lang="es" hidden></p>
        <span property="isActive" class="badge">
          <span data-badge="true" vocab="urn:ui:" typeof="badgeActive"></span>
          <span data-badge="false" vocab="urn:ui:" typeof="badgeInactive"></span>
        </span>
      </header>

      <dl>
        <div data-if="description">
          <dt typeof="description"></dt>
          <dd property="description" xml:lang="en"></dd>
          <dd property="description" xml:lang="fr" hidden></dd>
          <dd property="description" xml:lang="es" hidden></dd>
        </div>

        <div data-if="isActive:true">
          <dt typeof="email"></dt>
          <dd><a property="email" data-attr-aria-disabled="isActive:false"></a></dd>

          <dt typeof="url"></dt>
          <dd><a property="url" target="_blank" data-attr-aria-disabled="isActive:false"></a></dd>
        </div>

        <div data-if="address">
          <dt typeof="address"></dt>
          <dd property="address" typeof="PostalAddress" resource="#address">
            <span property="streetAddress"></span>,
            <span property="addressLocality"></span>,
            <span property="addressCountry"></span>
          </dd>
        </div>

        <div data-if="worksFor">
          <dt typeof="worksFor"></dt>
          <dd property="worksFor" typeof="Organization">
            <span property="name" class="org-name"></span>
            (<a property="url" target="_blank" class="org-link"></a>)
            <p property="description" class="org-description"></p>
          </dd>
        </div>

        <dt typeof="knowsLanguage"></dt>
        <dd property="knowsLanguage" class="chips">
          <template><span class="chip" data-transform="uppercase"></span></template>
        </dd>

        <dt typeof="hasSkill"></dt>
        <dd>
          <ol property="hasSkill" class="skill-list">
            <template><li></li></template>
          </ol>
        </dd>
      </dl>

      <p data-if="isActive:false" class="notice" vocab="urn:ui:" typeof="inactiveNotice"></p>

      <footer class="validation-status">
        <span data-if="conforms:true" class="conformance valid" vocab="urn:ui:" typeof="shaclValid"></span>
        <span data-if="conforms:false" class="conformance invalid" vocab="urn:ui:" typeof="shaclInvalid"></span>
      </footer>
    </article>
  </template>
</profile-card>
